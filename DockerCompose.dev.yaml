# Normal development — does not reset .env or the database on container start.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./huddle:/var/www/html
    environment:
      HUDDLE_FRESH_INSTALL: "0"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: huddle
      MYSQL_USER: huddle
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - huddle_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  huddle_db:
