services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./huddle:/var/www/html
    depends_on:
      - db
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laraveluser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"